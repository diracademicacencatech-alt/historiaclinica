{% extends "base.html" %}
{% block title %}{{ 'Editar' if medicamento else 'Nuevo' }} Medicamento{% endblock %}

{% block content %}
<div id="contenido-a-extraer">
    <div class="container mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-pills me-2"></i>
                    {{ 'Editar' if medicamento else 'Registrar Nuevo' }} Medicamento
                </h4>
            </div>
            <div class="card-body bg-light">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Código (CUM/Interno)</label>
                            <input type="text" name="codigo" class="form-control"
                                   value="{{ medicamento.codigo if medicamento else '' }}" 
                                   placeholder="Ej: MED-001" required>
                        </div>
                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold">Nombre del Medicamento</label>
                            <input type="text" name="nombre" class="form-control"
                                   value="{{ medicamento.nombre if medicamento else '' }}" 
                                   placeholder="Ej: ACETAMINOFEN 500mg" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Forma Farmacéutica</label>
                            <input type="text" name="forma_farmaceutica" class="form-control"
                                   value="{{ medicamento.forma_farmaceutica if medicamento else '' }}"
                                   placeholder="Ej: Tableta, Jarabe, Ampolla">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Presentación / Concentración</label>
                            <input type="text" name="presentacion" class="form-control"
                                   value="{{ medicamento.presentacion if medicamento else '' }}"
                                   placeholder="Ej: Caja x 30, Frasco 120ml">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-success">Stock Inicial / Disponible</label>
                            <input type="number" step="0.01" name="cantidad_disponible" class="form-control border-success"
                                   value="{{ medicamento.cantidad_disponible if medicamento else 0 }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Unidad de Medida (Inventario)</label>
                            <input type="text" name="unidad_inventario" class="form-control"
                                   value="{{ medicamento.unidad_inventario if medicamento else '' }}"
                                   placeholder="Ej: Unidades, ml, mg">
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('param.medicamentos') }}" class="btn btn-secondary px-4">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success px-5">
                            <i class="fas fa-save"></i> Guardar Medicamento
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

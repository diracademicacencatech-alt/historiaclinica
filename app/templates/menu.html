{% extends "base.html" if not request.headers.get('HX-Request') else "" %}
{% block title %}Software SM - Dashboard{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <nav class="sidebar-professional">
        <div class="sidebar-menu">
            <p class="menu-label">MODULOS</p>
            
            <a hx-get="{{ url_for('pacientes.listar') }}" 
               hx-target="#contenido-principal" 
               hx-select="#contenido-a-extraer"
               hx-push-url="true"
               class="menu-link active"
               style="cursor: pointer;">
                <i class="fas fa-users"></i> Pacientes
            </a>

            <a hx-get="/enfermeria/" 
   hx-target="#contenido-principal" 
   hx-swap="innerHTML"
   class="menu-link"
   style="cursor: pointer;">
    <i class="fas fa-user-nurse"></i> Enfermería
</a>

            <a hx-get="{{ url_for('ayudas.inicio_ayudas') }}" 
               hx-target="#contenido-principal" 
               hx-select="#contenido-a-extraer"
               hx-push-url="false"
               class="menu-link"
               style="cursor: pointer;">
                <i class="fas fa-microscope"></i> Ayudas Diagnósticas
            </a>

            <p class="menu-label">Configuración</p>
            <div class="settings-grid">
                <a hx-get="{{ url_for('inventario.listar_insumos') }}" hx-target="#contenido-principal" hx-select="#contenido-a-extraer" hx-push-url="true" title="Insumos" style="cursor: pointer;"><i class="fas fa-box"></i></a>
                <a hx-get="{{ url_for('param.medicamentos') }}" hx-target="#contenido-principal" hx-select="#contenido-a-extraer" hx-push-url="true" title="Medicamentos" style="cursor: pointer;"><i class="fas fa-pills"></i></a>
                <a hx-get="{{ url_for('param.cie10') }}" hx-target="#contenido-principal" hx-select="#contenido-a-extraer" hx-push-url="true" title="CIE-10" style="cursor: pointer;"><i class="fas fa-notes-medical"></i></a>
                <a hx-get="{{ url_for('param.laboratorios') }}" hx-target="#contenido-principal" hx-select="#contenido-a-extraer" hx-push-url="true" title="Laboratorios" style="cursor: pointer;"><i class="fas fa-vial"></i></a>
            </div>
        </div>
    </nav>

    <main class="main-content-pro">
        <div id="contenido-principal">
            <section class="welcome-banner">
                <div class="banner-text">
                    <h2>¡Hola!</h2>
                    <p>Para iniciar revisa los módulos de la izquierda</p>
                </div>
                <div class="banner-img">
                    <i class="fas fa-hospital-user shadow-lg"></i>
                </div>
            </section>
        </div>
    </main>
</div>

<style>
    /* Reset y Estructura */
    .dashboard-wrapper {
        display: flex;
        width: 100%;
        background-color: #f4f7f6;
    }

    .sidebar-professional {
        width: 280px;
        min-width: 280px;
        background: #236e7b !important;
        color: #fff;
        padding: 30px 20px;
        height: fit-content;
        position: sticky;
        top: 20px;
        margin: 20px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .menu-label { 
        font-size: 0.7rem; 
        text-transform: uppercase; 
        color: #dde6e9; 
        font-weight: 700; 
        margin-top: 20px; 
        letter-spacing: 1.2px;
    }

    .menu-link {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        color: #eaeef0;
        text-decoration: none !important;
        border-radius: 12px;
        margin-bottom: 8px;
        transition: all 0.3s ease;
    }

    .menu-link:hover { 
        background: rgba(255, 255, 255, 0.1); 
        color: #fff; 
        transform: translateX(5px);
    }

    .settings-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 10px;
    }

    .settings-grid a {
        background: rgba(255,255,255,0.1); 
        color: #fff; 
        height: 45px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        border-radius: 10px; 
        text-decoration: none;
    }

    .main-content-pro {
        flex: 1;
        padding: 20px;
    }

    .welcome-banner {
        background: linear-gradient(135deg, #236e7b 0%, #3498db 100%);
        padding: 40px;
        border-radius: 24px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
</style>
{% endblock %}

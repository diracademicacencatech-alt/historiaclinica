<div id="contenido-a-extraer">
    <style>
        /* ... (tus estilos se mantienen intactos) ... */
        :root { --titles: #236e7b; --text-links: #0b6169; }
        .btn-gestion-total {
            background-color: var(--titles);
            color: white !important;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-gestion-total:hover { background-color: #1a525c; transform: scale(1.02); }
    </style>

    <div class="container py-2 fade-in-content">
        <h2 class="titulo-principal"><i class="fas fa-users-medical"></i> Selección de Paciente</h2>

        <div class="search-box">
            <label class="form-label fw-bold mb-2" style="font-size: 0.8rem; text-transform: uppercase;">Localizar para Gestión Integral</label>
            <div class="input-group">
                <input type="text" id="buscador_paciente" class="form-control input-search-custom" placeholder="Documento o nombre del paciente...">
                <button class="btn btn-search-custom" onclick="buscarYCompletarPaciente()">
                    <i class="fas fa-search"></i> BUSCAR PACIENTE
                </button>
            </div>
        </div>

        <div class="table-responsive table-sm-custom">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th style="width: 15%;">Documento</th>
                        <th style="width: 50%;">Nombre Completo</th>
                        <th style="width: 35%;" class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="pacientes_tbody">
                    {% for paciente in pacientes %}
                    <tr>
                        <td><span class="badge bg-light text-dark border">{{ paciente.numero }}</span></td>
                        <td class="fw-bold" style="color: var(--text-links);">{{ paciente.nombre }}</td>
                        <td class="text-center">
                            <a class="btn-gestion-total" 
                               hx-get="{{ url_for('enfermeria.menu_paciente', paciente_id=paciente.id) }}" 
                               hx-target="#contenido-principal"
                               style="cursor:pointer;">
                                <i class="fas fa- hospital-user"></i> ABRIR EXPEDIENTE
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
    (function() {
        window.buscarYCompletarPaciente = function() {
            const queryInput = document.getElementById('buscador_paciente');
            const query = queryInput.value.trim();
            if (!query) return;

            const tbody = document.getElementById('pacientes_tbody');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4"><div class="spinner-border text-teal" role="status"></div></td></tr>';

            fetch('/enfermeria/api/buscar_info_paciente?q=' + encodeURIComponent(query))
                .then(r => r.json())
                .then(data => {
                    tbody.innerHTML = "";
                    if (data.error) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">No se encontró el paciente</td></tr>';
                        return;
                    }
                    
                    // Busca esta línea en el script de listar.html y déjala exactamente así:
tbody.innerHTML = `
    <tr class="table-light">
        <td><span class="badge bg-light text-dark border">${data.documento}</span></td>
        <td class="fw-bold" style="color: var(--text-links);">${data.nombre}</td>
        <td class="text-center">
            <a class="btn-gestion-total" 
               href="/enfermeria/paciente/${data.paciente_id}/menu">
                <i class="fas fa-hospital-user"></i> ABRIR EXPEDIENTE
            </a>
        </td>
    </tr>`;
                    
                    // IMPORTANTE: Como el contenido es dinámico, le decimos a HTMX que procese el nuevo botón
                    htmx.process(tbody);
                });
        };
    })();
    </script>
</div>

{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <div class="card border-0 shadow-sm" style="background-color: #f0e7d8;">
        <div class="card-header bg-transparent border-0 pt-4">
            <h4 style="color: #236e7b; font-weight: 800;" class="text-center">EDITAR ADMINISTRACIÓN</h4>
            <p class="text-center" style="color: #0b6169;">{{ admin.medicamento.nombre }}</p>
        </div>
        
        <form method="POST" class="card-body px-4">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Cantidad</label>
                    <input type="number" step="0.1" name="cantidad" class="form-control" value="{{ admin.cantidad }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Vía</label>
                    <select name="via" class="form-select">
                        <option value="VO" {% if admin.via == 'VO' %}selected{% endif %}>Vía Oral</option>
                        <option value="IV" {% if admin.via == 'IV' %}selected{% endif %}>Intravenosa</option>
                        <option value="IM" {% if admin.via == 'IM' %}selected{% endif %}>Intramuscular</option>
                        <option value="SC" {% if admin.via == 'SC' %}selected{% endif %}>Subcutánea</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Fecha y Hora de Administración</label>
                <input type="datetime-local" name="hora_administracion" class="form-control" 
                       value="{{ admin.hora_administracion.strftime('%Y-%m-%dT%H:%M') }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Observaciones / Notas</label>
                <textarea name="observaciones" class="form-control" rows="3">{{ admin.observaciones }}</textarea>
            </div>

            <div class="d-flex justify-content-between pt-3 pb-3">
                <a href="{{ url_for('enfermeria.administrar_medicamentos', registro_id=admin.registro_enfermeria_id) }}" 
                   class="btn btn-secondary px-4">Volver</a>
                <button type="submit" class="btn btn-success fw-bold px-4" style="background-color: #28a745;">
                    💾 GUARDAR CAMBIOS
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
